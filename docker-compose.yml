version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: covert-postgres
    environment:
      POSTGRES_USER: covert_user
      POSTGRES_PASSWORD: covert_password
      POSTGRES_DB: covert_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U covert_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - covert-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: covert-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - covert-network

  # IPFS Node
  ipfs:
    image: ipfs/kubo:latest
    container_name: covert-ipfs
    ports:
      - "4001:4001"     # P2P
      - "5001:5001"     # API
      - "8080:8080"     # Gateway
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD-SHELL", "ipfs id"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - covert-network

  # Local Blockchain (Anvil)
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: covert-anvil
    command: anvil --host 0.0.0.0 --block-time 2
    ports:
      - "8545:8545"
    networks:
      - covert-network

volumes:
  postgres_data:
  redis_data:
  ipfs_data:

networks:
  covert-network:
    driver: bridge
